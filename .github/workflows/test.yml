name: CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  # Required for vite build (client-side)
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
  VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
  VITE_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
  VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
  VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
  # Required for server-side API (used at runtime, not build time)
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SERVICE_EMAIL: ${{ secrets.GOOGLE_SERVICE_EMAIL }}
  GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
  RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Step 1: Unit tests
      - name: Run unit tests
        run: npm test

      # Step 2: Build (also validates env vars via verify-env.mjs)
      - name: Build production bundle
        run: npm run build

  deploy:
    # Only deploy on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Step 3: Build for deploy
      - name: Build production bundle
        run: npm run build

      # Step 4: Install Puppeteer for E2E tests
      - name: Install Puppeteer
        run: npm install --no-save puppeteer

      # Step 5: Start preview server for E2E tests
      - name: Start preview server
        run: |
          npx vite preview --port 3002 &
          sleep 3
          echo "Preview server started on port 3002"

      # Step 6: Run E2E tests against preview server
      - name: Run E2E tests
        run: node scripts/deploy-e2e.mjs http://localhost:3002

      # Step 7: Mobile screenshots for visual review
      - name: Take mobile screenshots (all roles)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SCREENSHOT_RECIPIENT: sera.belize@gmail.com
        run: |
          npx playwright install chromium
          node scripts/predeploy-screenshots.mjs http://localhost:3002

      # Step 8: Upload screenshots as artifacts
      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: predeploy-screenshots
          path: screenshots/
          retention-days: 14

      # Step 9: Deploy to Vercel production
      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

      # Step 8: Smoke test against production
      - name: E2E smoke test on production
        run: |
          sleep 10  # Wait for Vercel to propagate
          node scripts/deploy-e2e.mjs https://abhayandrebecca.com

      # Step 9: Email deploy confirmation
      - name: Notify deploy success
        if: success()
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
        run: |
          node -e "
            const msg = [
              'Deploy succeeded — $(date -u)',
              '',
              'Site: https://abhayandrebecca.com',
              'Commit: ${{ github.sha }}',
              'Tests: E2E smoke test passed',
            ].join('\n')
            fetch('https://api.emailjs.com/api/v1.0/email/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                service_id: process.env.EMAILJS_SERVICE_ID,
                template_id: process.env.EMAILJS_TEMPLATE_ID,
                user_id: process.env.EMAILJS_PUBLIC_KEY,
                template_params: {
                  email: 'sera.belize@gmail.com',
                  name: 'Deploy Bot',
                  contact_type: 'deploy-notify',
                  subject: '✅ Site deployed successfully',
                  message: msg,
                },
              }),
            }).then(r => r.ok ? console.log('Notification sent') : Promise.reject(r.status))
          "