name: Daily Guest Report

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SERVICE_EMAIL: ${{ secrets.GOOGLE_SERVICE_EMAIL }}
  GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  REPORT_RECIPIENT: sera.belize@gmail.com
  # ─────────────────────────────────────────────
  # DAYS_BETWEEN: Only flag logins/updates within
  # this many days. Set to 7 for weekly summaries,
  # 1 for daily, etc.
  # ─────────────────────────────────────────────
  DAYS_BETWEEN: '1'
  SITE_URL: https://abhayandrebecca.com

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate and send report
        run: node scripts/daily-report.mjs

      - name: Upload sheet backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: guests-backup
          path: public/guests-backup.json
          retention-days: 30
